# Application
spring.application.name=soafinanzas

# Database - Neon PostgreSQL
spring.datasource.url=jdbc:postgresql://ep-mute-waterfall-amsv4o6z-pooler.c-5.us-east-1.aws.neon.tech/finanzas_db?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_IRns5uLEkmJ6
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8088

# Logging
logging.level.com.donbelisario.finanzas=DEBUG

management.info.env.enabled=true
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always


# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=true
# Forzar Swagger a usar JSON y evitar conflictos con XML
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.content-type=application/json
springdoc.writer-with-default-pretty-printer=true
